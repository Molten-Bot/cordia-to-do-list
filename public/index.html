<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta
      name="description"
      content="To do list turns pasted emails and notes into a local task queue."
    >
    <title>To do list</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Emails + notes</p>
          <h1>To do list</h1>
        </div>
        <div class="topbar-actions">
          <span class="save-state" id="save-state" role="status">Autosaved</span>
          <label class="theme-field">
            <span>Theme</span>
            <select id="theme-select">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
        </div>
      </header>

      <main id="main" class="workspace" aria-label="To do list workspace">
        <section class="source-panel" aria-labelledby="source-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Source</p>
              <h2 id="source-title">Inbox text</h2>
            </div>
            <span class="pill" id="draft-status">0 found</span>
          </div>

          <div class="inbox-setup" aria-labelledby="inbox-setup-title">
            <div>
              <p class="eyebrow">Forwarding</p>
              <h3 id="inbox-setup-title">Task inbox</h3>
            </div>
            <label for="inbox-address">Forward-to address</label>
            <div class="input-row">
              <input
                id="inbox-address"
                name="inbox-address"
                type="email"
                autocomplete="email"
                inputmode="email"
                placeholder="MYNAME+todo@gmail.com"
              >
              <button class="button secondary" id="copy-inbox-address" type="button">Copy</button>
            </div>
            <span class="save-state" id="inbox-status" role="status">Forwarding target ready</span>
          </div>

          <label class="source-field" for="source-text">Paste emails or notes</label>
          <textarea
            id="source-text"
            spellcheck="true"
            placeholder="Paste email threads, meeting notes, or scratch notes here."
          ></textarea>

          <div class="source-actions">
            <button class="button primary" id="import-tasks" type="button">Import tasks</button>
            <span><strong id="import-count">0</strong> task lines found</span>
          </div>
        </section>

        <section class="tasks-panel" aria-labelledby="tasks-title">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Queue</p>
              <h2 id="tasks-title">Tasks</h2>
            </div>
            <button class="button secondary" id="clear-done" type="button">Clear done</button>
          </div>

          <div class="stats-grid" aria-label="Task totals">
            <div>
              <strong id="total-count">0</strong>
              <span>Total</span>
            </div>
            <div>
              <strong id="active-count">0</strong>
              <span>Active</span>
            </div>
            <div>
              <strong id="done-count">0</strong>
              <span>Done</span>
            </div>
          </div>

          <form class="add-task-form" id="add-task-form">
            <label for="manual-task">Manual task</label>
            <div class="input-row">
              <input
                id="manual-task"
                name="task"
                type="text"
                autocomplete="off"
                maxlength="120"
                placeholder="Add one task"
                required
              >
              <button class="button primary" type="submit">Add</button>
            </div>
          </form>

          <ul class="task-list" id="task-list" aria-live="polite"></ul>
        </section>
      </main>

      <footer class="site-footer">
        <span>Created by <a href="https://cordia.molten.bot">cordia.molten.bot</a>.</span>
        <a href="/release.json">Release 0</a>
      </footer>
    </div>
  </body>
</html>
